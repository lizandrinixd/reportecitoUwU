<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes de Parques</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}

header {
    background: #2ecc71;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    position: sticky;
    top: 0;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#mapBtn {
    background: #3498db;
    color: white;
}

#reportBtn {
    background: #e74c3c;
    color: white;
}

.container {
    padding: 15px;
}

#formulario {
    display: none;
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

input, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
}

video {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
}

.reporte {
    background: white;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>
    🌳 Reportes de Parques
    <br>
    <button id="mapBtn">Abrir Maps</button>
    <button id="reportBtn">Levantar Reporte</button>
</header>

<div class="container">

    <div id="formulario">
        <h3>Nuevo Reporte</h3>
        <textarea id="texto" placeholder="Describe el problema..."></textarea>
        <button onclick="activarCamara()">Activar Cámara</button>
        <video id="video" autoplay></video>
        <button onclick="guardarReporte()">Guardar Reporte</button>
    </div>

    <h3>Reportes</h3>
    <div id="lista"></div>

</div>

<script>
const mapBtn = document.getElementById("mapBtn");
const reportBtn = document.getElementById("reportBtn");
const formulario = document.getElementById("formulario");

mapBtn.onclick = () => {
    window.open("https://www.google.com/maps");
};

reportBtn.onclick = () => {
    formulario.style.display = formulario.style.display === "none" ? "block" : "none";
};

function guardarReporte() {
    const texto = document.getElementById("texto").value;

    if (!texto) {
        alert("Escribe algo");
        return;
    }

    const reportes = JSON.parse(localStorage.getItem("reportes")) || [];

    reportes.push({
        texto: texto,
        fecha: new Date().toLocaleString()
    });

    localStorage.setItem("reportes", JSON.stringify(reportes));

    document.getElementById("texto").value = "";
    cargarReportes();
}

function cargarReportes() {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    const reportes = JSON.parse(localStorage.getItem("reportes")) || [];

    reportes.reverse().forEach(rep => {
        const div = document.createElement("div");
        div.className = "reporte";
        div.innerHTML = `<b>${rep.fecha}</b><br>${rep.texto}`;
        lista.appendChild(div);
    });
}

function activarCamara() {
    const video = document.getElementById("video");

    navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
        video.srcObject = stream;
    })
    .catch(err => {
        alert("No se pudo acceder a la cámara");
    });
}

cargarReportes();
</script>

</body>
</html>
